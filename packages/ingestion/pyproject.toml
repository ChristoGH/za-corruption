[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[project]
name = "commission-ingestion"
version = "0.1.0"
description = "Source discovery and retrieval for South African commission transcripts"
requires-python = ">=3.11"
dependencies = [
    "requests>=2.31",
    "beautifulsoup4>=4.12",
    "pydantic>=2.0",
    "pymupdf>=1.24",
    "qdrant-client>=1.12",
]

[project.optional-dependencies]
playwright = ["playwright==1.49.0"]
stats = ["matplotlib>=3.8", "pyyaml>=6.0"]
# Heavy (torch) — only needed to embed/search, not for parsing or CI tests.
vector = ["sentence-transformers>=3.0"]
dev = ["pytest>=7.4"]

[project.scripts]
retrieve-sources = "commission_ingestion.cli.retrieve_sources:run_cli"
parse-corpus = "commission_ingestion.cli.parse_corpus:run_cli"
corpus-stats = "commission_ingestion.cli.corpus_stats:run_cli"
load-qdrant = "commission_ingestion.cli.load_qdrant:run_cli"
search-corpus = "commission_ingestion.cli.search:run_cli"

[tool.hatch.build.targets.wheel]
packages = ["commission_ingestion"]

[tool.pytest.ini_options]
testpaths = ["tests"]
