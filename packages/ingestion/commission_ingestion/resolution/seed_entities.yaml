  # each its OWN scoped entity, never collapsed on bare surname (cf. four-Khumalos
  # rule). NB the parser (parsing/turns.py LABEL_RE) does NOT yet detect
  # "COMMISSIONER <surname>:" as a turn boundary, so SPOKE_IN currently absorbs
  # these turns into the preceding speaker (Mkhwanazi 5316, Spies 905, Faro 719,
  # Bolhuis 241, Malatji 4 inline turns) — see pre-step A finding. The claim
  # writer still resolves the model-attributed speaker via these aliases so
  # STATED_BY is populated; a turns.py fix (re-chunk cascade) is sequenced later.
  - id: person:jd-mkhwanazi
