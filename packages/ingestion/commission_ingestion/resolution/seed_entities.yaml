# Canonical entity store — Madlanga Commission corpus.
#
# Human-editable and human-owned: the resolver NEVER merges entities on its own;
# it only matches against the ids/aliases here. Approving a proposed merge from
# the review queue means adding the surface form as an alias here and re-running
# resolution. Keep aliases as FULL speaker labels / surface forms — surname-only
# aliases are forbidden because surnames collide (there are four distinct
# Khumalos in this corpus alone).
#
# Sources: official commission records (speaker labels from the parsed corpus,
# data/processed/stats/madlanga_stats.json) and widely reported public facts
# about the commission's composition. Anything uncertain is marked in `note`
# and should be verified before publication.

version: 1
commission: madlanga
