name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      # No --all-extras: the unit tests don't need the optional Playwright
      # dependency, and skipping it keeps CI lean.
      - name: Sync dependencies
        run: uv sync --all-packages

      - name: Run tests
        run: uv run --no-sync pytest packages/ingestion/tests -v
