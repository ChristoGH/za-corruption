  <!-- One gold bar = "this post's focus". Move x per post for a subtle per-part variation. -->
  <rect x="320" y="900" width="14" height="280" fill="#C9A227"/>

  <!-- Baseline under the bars -->
  <rect x="60" y="1182" width="960" height="2" fill="#F4EFE6" opacity="0.25"/>

  <!-- Series kicker -->
  <text x="60" y="120" fill="#C9A227" font-size="30" letter-spacing="7" font-weight="bold">DECODING THE MADLANGA COMMISSION</text>
  <rect x="60" y="140" width="120" height="4" fill="#C9A227"/>

  <!-- EDITABLE ① — Part number -->
  <text x="60" y="330" fill="#F4EFE6" font-size="170" font-weight="bold" letter-spacing="-4">PART 01</text>

  <!-- EDITABLE ② — Post title (2 lines max, ~16 chars/line at this size) -->
  <text x="60" y="480" fill="#F4EFE6" font-size="84" font-weight="bold" letter-spacing="-1">THE COMMISSION,</text>
  <text x="60" y="575" fill="#F4EFE6" font-size="84" font-weight="bold" letter-spacing="-1">BY THE NUMBERS</text>

  <!-- EDITABLE ③ — Three headline stats (replace with real corpus_stats output) -->
  <g font-weight="bold">
    <text x="60"  y="730" fill="#C9A227" font-size="64">[109]</text>
    <text x="60"  y="772" fill="#F4EFE6" font-size="26" opacity="0.85" font-weight="normal">hearing transcripts</text>
    <text x="400" y="730" fill="#C9A227" font-size="64">[N]k</text>
    <text x="400" y="772" fill="#F4EFE6" font-size="26" opacity="0.85" font-weight="normal">pages, all citable</text>
    <text x="740" y="730" fill="#C9A227" font-size="64">[N]M</text>
    <text x="740" y="772" fill="#F4EFE6" font-size="26" opacity="0.85" font-weight="normal">words of testimony</text>
  </g>

  <!-- Motif caption -->
  <text x="60" y="860" fill="#F4EFE6" font-size="24" opacity="0.65">each bar = one hearing day · Sep 2025 → today</text>

  <!-- Footer: handle + provenance promise (constant across the series) -->
  <text x="60" y="1265" fill="#F4EFE6" font-size="28" font-weight="bold">[Your Name] · open source</text>
  <text x="60" y="1305" fill="#F4EFE6" font-size="24" opacity="0.65">every datapoint traceable to a page of the official record</text>
  <text x="1020" y="1305" fill="#C9A227" font-size="24" text-anchor="end" font-weight="bold">01 / 05</text>
</svg>
